<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Introduction</title>
  <link rel="stylesheet" href="intro.css">
</head>
<body>
  <div class="intro-container">
    <div class="intro-content">
      <h1>Guardians: Midnight BIT</h1>

      <section class="story">
        <h2>游戏背景</h2>
        <p>
          正如你在游戏介绍视频看到的，学校里面到处游荡着丧尸，而你收到神秘人的消息后下定决心守护学校，故事由此开始......(本游戏地图基于北理工良乡校区北校区制造)
        </p>
      </section>

      <section class="rules">
        <h2>游戏规则</h2>
        <ul>
          <li>目标：根据线索收集相关原材料制作解药，驱散丧尸病毒</li>
          <li>小心！丧尸在校园里面游荡，被它们抓住的话就完了！</li>
          <li>要学会利用一切的线索！加油，守护者！</li>
        </ul>
      </section>

      <button id="start-btn">开始游戏</button>
    </div>
  </div>

  <script src="intro.js"></script>
</body>
</html>
