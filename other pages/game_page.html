// ================== 配置 ==================
// 以下是常量配置：可视窗口、地图尺寸、玩家速度等
const VIEW_W = 1400, VIEW_H = 900;    // 页面显示尺寸
const MAP_W  = 10001, MAP_H  = 13752;  // 大地图尺寸（放大 10 倍）
const PLAYER_SPEED = 200; // 玩家移动速度（像素/秒）

// Phaser 游戏配置对象
const config = {
  type: Phaser.AUTO, // 自动选择渲染器 WebGL / Canvas
  width: VIEW_W,
  height: VIEW_H,
  parent: 'game-container', // 挂载元素 id
  backgroundColor: '#07111a',
  physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
  // 使用 Arcade 物理，关闭调试显示
  scene: [CampusScene, InteriorScene] // 声明场景顺序：先校园场景再内部场景
};

let game = new Phaser.Game(config); // 实例化 Phaser 游戏

// ------------------ 玩家绘制与动画 ------------------
// 动态生成玩家贴图与动画（用 Graphics 绘制简单像素人物）
function generatePlayerFrames(scene) {
  if (scene.anims.exists('walk_down')) return; // 如果已创建过动画就返回
  const base = (dir,f) => `p_${dir}_${f}`; // 纹理键命名规则
  function draw(g, dir, f) {
    // 在 Graphics 上绘制单帧人物（宽 36，高 52）
    const W=36,H=52;
    const shift = [0,2,-2][f], leg=[0,3,-3][f];
    const SKIN=0xF5D7B2, SHIRT=0x2d9cdb, PANTS=0x34495e, SHOE=0x111111;
    g.clear();
    g.fillStyle(SKIN,1); g.fillCircle(W/2,11,8); // 头
    g.fillStyle(0x2c3e50,1); g.beginPath(); g.moveTo(W/2-8,6); g.lineTo(W/2+8,6); g.lineTo(W/2+6,10); g.lineTo(W/2-6,12); g.closePath(); g.fillPath(); // 头发/帽檐
    g.fillStyle(SHIRT,1); g.fillRoundedRect(W/2-9,18,18,18,4); // 上衣
    g.fillStyle(SHIRT,1);
    if (dir==='side'){ g.fillRoundedRect(W/2-13-shift,20,6,14,3); g.fillRoundedRect(W/2+7+shift,20,6,14,3); }
    else { g.fillRoundedRect(W/2-14+shift,20,6,14,3); g.fillRoundedRect(W/2+8-shift,20,6,14,3); }
    // 手臂（根据方向调整位置）
    g.fillStyle(PANTS,1);
    if (dir==='side'){ g.fillRoundedRect(W/2-8-leg,36,7,12,3); g.fillRoundedRect(W/2+1+leg,36,7,12,3); }
    else { g.fillRoundedRect(W/2-9-leg,36,7,12,3); g.fillRoundedRect(W/2+2+leg,36,7,12,3); }
    // 鞋子
    g.fillStyle(SHOE,1); g.fillRoundedRect(W/2-9-leg,47,8,4,2); g.fillRoundedRect(W/2+1+leg,47,8,4,2);
    if (dir==='down'){ g.fillStyle(0x000000,1); g.fillCircle(W/2-3,11,1.3); g.fillCircle(W/2+3,11,1.3); g.lineStyle(1.2,0x000000,1); g.beginPath(); g.arc(W/2,14,2.5,0,Math.PI); g.strokePath(); }
    // 朝下时画简单表情
  }
  // 为三种方向各生成 3 帧，然后创建行走与待机动画
  ['down','up','side'].forEach(dir=>{
    for(let f=0;f<3;f++){
      const g = scene.add.graphics();
      draw(g,dir,f);
      g.generateTexture(base(dir,f),36,52); // 把 Graphics 转为贴图
      g.destroy(); // 销毁临时 Graphics 对象
    }
    scene.anims.create({ key:`walk_${dir}`, frames:[0,1,2].map(f=>({ key:base(dir,f) })), frameRate:10, repeat:-1 });
    // 创建 walk_* 循环动画
    scene.anims.create({ key:`idle_${dir}`, frames:[{key:base(dir,0)}], frameRate:1 });
    // 创建 idle_* 静止动画（单帧）
  });
}

// 创建玩家精灵并设置碰撞框
function createPlayer(scene, x, y){
  if (!scene.anims.exists('walk_down')) generatePlayerFrames(scene); // 确保动画已生成
  const s = scene.physics.add.sprite(x,y,'p_down_0'); // 在世界坐标 (x,y) 创建物理精灵
  s.setSize(18,24).setOffset(9,26); // 设置碰撞箱大小与偏移（使之与绘制的头像对齐）
  return s;
}

// ================== 建筑绘制工具 ==================
// 通过 Graphics 动态生成建筑贴图，并返回包含 sprite 和 label 的对象
function createBuilding(scene, cfg, container){
  // 修改：添加 exitX 和 exitY 参数默认值
  const { key, name, x, y, w, h, color=0x9b59b6, labelOffsetY=12, extraDraw=null, exitX=x, exitY=y+h/2 } = cfg;
  const g = scene.add.graphics();

  // 绘制建筑主体（圆角矩形）
  g.fillStyle(color,1); g.fillRoundedRect(0, 10, w, h-10, 6);
  g.lineStyle(3,0x000000,1); g.strokeRoundedRect(0, 10, w, h-10, 6);
  // 门（示意）
  g.fillStyle(0x7F5217,1); g.fillRoundedRect(w/2-10, h-42, 20, 30, 3);
  if (typeof extraDraw === 'function') extraDraw(g,w,h); // 可选额外绘制回调
  g.generateTexture(key, w, h); // 生成纹理键
  g.destroy(); // 销毁 Graphics

  // 创建静态物理 sprite，设置原点为中心
  const sprite = scene.physics.add.staticSprite(x, y, key).setOrigin(0.5, 0.5);
  sprite.setSize(w, h).setOffset(-w/2, -h/2); sprite.refreshBody(); // 刷新物理体形状
  // 建筑标签文字（注意：字体大小在放大地图时也放大了，这里用大号字体）
  const label = scene.add.text(x, y + h/2 + labelOffsetY, name, { fontSize:'160px', color:'#fff', stroke:'#000', strokeThickness:6 }).setOrigin(0.5, 0).setDepth(20);
  container.add([sprite, label]); // 将精灵与标签放入地图容器，随地图移动
  return { key, name, sprite, label, x, y, w, h ,exitX ,exitY};
}

// ================== 判定：贴边/接触 ==================
// 判断两个物理 body 是否接触或接近（容差控制）
function isTouching(bodyA, bodyB, tolerance = 2.5) {
  const ax1 = bodyA.x, ay1 = bodyA.y, ax2 = bodyA.right, ay2 = bodyA.bottom;
  const bx1 = bodyB.x, by1 = bodyB.y, bx2 = bodyB.right, by2 = bodyB.bottom;
  // 计算两矩形在轴向上的最小分离距离 dx, dy（若为负则表示重叠）
  const dx = Math.max(bx1 - ax2, ax1 - bx2, 0);
  const dy = Math.max(by1 - ay2, ay1 - by2, 0);
  const dist = Math.hypot(dx, dy); // 欧氏距离
  return dist <= tolerance; // 若小于等于容差则认为接触
}

// ================== 场景：校园 ==================
function CampusScene(){ Phaser.Scene.call(this, { key: 'CampusScene' }); }
CampusScene.prototype = Object.create(Phaser.Scene.prototype);
CampusScene.prototype.constructor = CampusScene;

// 预加载地图图片
CampusScene.prototype.preload = function(){
  this.load.image('mapBG', 'https://raw.githubusercontent.com/Staruto/NUS-SWS-2025-Game/refs/heads/main/death/main%20map.png'); // 注意路径
};

CampusScene.prototype.create = function(){
  const scene = this;
  this.mapContainer = scene.add.container(0, 0);

  // 使用背景图片
  const bg = this.add.image(0, 0, 'mapBG').setOrigin(0, 0);
  bg.setDisplaySize(MAP_W, MAP_H); // 拉伸到大地图尺寸
  this.mapContainer.add(bg);

  this.player = createPlayer(scene, 3000, 12000);
  this.player.anims.play('idle_down');

  // 摄像机跟随玩家
  const cam = this.cameras.main;
  cam.startFollow(this.player, true, 0.08, 0.08);
  cam.setBounds(0, 0, MAP_W, MAP_H);

  this.wasd = this.input.keyboard.addKeys({ up:'W', left:'A', down:'S', right:'D' });

//   this.buildings.push(createBuilding(scene, { key:'teachB', name:'综合教学楼 B', x:11000, y:10800, w:2000, h:1600, color:0xd35400 }, this.mapContainer));
//   this.buildings.push(createBuilding(scene, { key:'admin', name:'行政楼', x:15000, y:10200, w:2200, h:1600, color:0xf39c12 }, this.mapContainer));
  this.buildings.push(createBuilding(scene, {

    x:25000,

    h:4500, 
    color:'#E0E9A3', 
    labelOffsetY:180,
    exitX: 29500,
    exitY: 59200
  }, this.mapContainer));
  this.buildings.push(createBuilding(scene, {

    x:5000, 
    y:49500, 
    w:3000, 
    h:4000, 
    color:'darkblue',
    exitX: 8000,
    exitY: 51500
  }, this.mapContainer));
  this.buildings.push(createBuilding(scene, { 
    key:'canteen', 
    name:'北食堂', 
    x:12800, 
    y:15600, 
    w:1800, 
    h:1200, 
    color:0x9b59b6,
    exitX: 13700,
    exitY: 16800
  }, this.mapContainer));
  this.buildings.push(createBuilding(scene, { 
    key:'canteen', 
    name:'清真食堂', 
    x:12800, 
    y:15600, 
    w:1800, 
    h:1200, 
    color:0x9b59b6,
    exitX: 13700,
    exitY: 16800
  }, this.mapContainer));
  this.buildings.push(createBuilding(scene, { 
    key:'dorm1', 
    name:'静园A', 
    x:7000, 
    y:57000, 
    w:6000,

    exitX: 10000,
    exitY: 58000
  }, this.mapContainer));
  this.buildings.push(createBuilding(scene, { 
    key:'dorm2', 
    name:'静园B', 
    x:10800, 
    y:18200, 
    w:2400,

//   this.buildings.push(createBuilding(scene, { key:'stadium', name:'体育馆 / 操场', x:24600, y:17800, w:5600, h:3000, color:0xe67e22, labelOffsetY:200 }, this.mapContainer));

  this.input.keyboard.on('keydown-PLUS', () => { cam.setZoom(Math.min(cam.zoom + 0.12, 1.6)); });

// CampusScene 的 update：处理输入、动画、交互检测等
CampusScene.prototype.update = function() {
  const p = this.player;
  const left = this.cursors.left.isDown || this.wasd.left.isDown;
  const right = this.cursors.right.isDown || this.wasd.right.isDown;
  const up = this.cursors.up.isDown || this.wasd.up.isDown;
  const down = this.cursors.down.isDown || this.wasd.down.isDown;

  p.setVelocity(0); // 每帧先清除速度，再根据输入设置
  if (left) { p.setVelocityX(-PLAYER_SPEED); p.flipX = true; p.anims.play('walk_side', true); }
  else if (right) { p.setVelocityX(PLAYER_SPEED); p.flipX = false; p.anims.play('walk_side', true); }
  if (up) { p.setVelocityY(-PLAYER_SPEED); p.anims.play('walk_up', true); }
  else if (down) { p.setVelocityY(PLAYER_SPEED); p.anims.play('walk_down', true); }
  if (!left && !right && !up && !down) {
    const cur = p.anims.currentAnim ? p.anims.currentAnim.key : 'idle_down';
    const dir = cur.includes('side') ? 'side' : (cur.includes('up') ? 'up' : 'down');
    p.anims.play(`idle_${dir}`); // 无输入时播放对应朝向的 idle 动画
  }

  // 检测最近建筑（贴边也算）
  this.currentBuilding = null;
  let nearest = { d: 1e12, b: null };
  for (const b of this.buildings) {
    const touching = isTouching(p.body, b.sprite.body, 6); // 容差 6，方便触发交互
    if (touching) {
      const dx = p.x - b.sprite.x, dy = p.y - b.sprite.y;
      const d2 = dx*dx + dy*dy;
      if (d2 < nearest.d) nearest = { d: d2, b };
    }
  }

  if (nearest.b) {
    this.currentBuilding = nearest.b;
    this.interactText.setVisible(true);
    // 把提示放到屏幕中心相对于建筑方向的偏移处（始终固定屏幕坐标）
    const angle = Math.atan2(p.y - nearest.b.sprite.y, p.x - nearest.b.sprite.x);
    const hx = VIEW_W/2 + Math.cos(angle) * 100;
    const hy = VIEW_H/2 + Math.sin(angle) * 100;
    this.interactText.setPosition(hx - this.interactText.width/2, hy - 18);
  } else {
    this.interactText.setVisible(false);
  }

this.coordText.setText(`X: ${Math.floor(this.player.x)}, Y: ${Math.floor(this.player.y)}`);

};

// ================== 场景：建筑内部（简洁） ==================
function InteriorScene(){ Phaser.Scene.call(this, { key: 'InteriorScene' }); }
InteriorScene.prototype = Object.create(Phaser.Scene.prototype);
InteriorScene.prototype.constructor = InteriorScene;

InteriorScene.prototype.create = function(data) {
  this.cameras.main.setBackgroundColor('#06121a'); // 室内场景背景色
  this.add.text(VIEW_W/2, 12, data.name || '内部空间', { fontSize:'26px', color:'#ffd166', stroke:'#000', strokeThickness:6 }).setOrigin(0.5, 0);
  // 居中角色（仅表现用）
  const player = createPlayer(this, VIEW_W/2, VIEW_H/2);
  player.anims.play('idle_down');
  this.add.text(VIEW_W/2, VIEW_H - 28, '按 Esc 返回校园', { fontSize:'16px', color:'#ccc' }).setOrigin(0.5);
  const esc = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);
  // 修改：返回时传递建筑信息
  esc.on('down', () => this.scene.start('CampusScene', { building: data.building })); // 按 Esc 返回主场景并传递建筑信息
};
