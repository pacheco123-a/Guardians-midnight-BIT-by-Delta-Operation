<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>存档管理</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-image: url('https://placehold.co/1920x1080/000000/FFFFFF.png?text=Game+Background'); /* 默认背景图 */
            background-size: cover;
            background-position: center;
        }

        .header {
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .header a {
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            padding: 5px 10px;
            border: 1px solid #fff;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }

        .header a:hover {
            background-color: #fff;
            color: #000;
        }

        .archives {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            height: 100vh;
            gap: 20px;
            padding-top: 60px; /* 留出头部空间 */
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            width: 300px;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }
        
        /* 悬浮效果 */
        .glass:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .glass p {
            margin: 5px 0;
        }

        .glass .mapId {
            font-size: 20px;
            font-weight: bold;
        }

        .button-container {
            display: flex;
            gap: 10px;
        }

        .button-container button {
            background-color: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            font-weight: bold;
        }

        .button-container button:hover {
            background-color: #ddd;
            transform: scale(1.05);
        }

        .fade {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease-in-out;
            z-index: 9999;
        }

    </style>
</head>

<body>
    <div class="header">
        <a href="javascript:history.back()">返回</a>
    </div>

    <div class="archives">
        <div class="glass">
            <p>存档位1</p>
            <p class="mapId">未存档</p>
            <div class="button-container"></div>
        </div>
        <div class="glass">
            <p>存档位2</p>
            <p class="mapId">未存档</p>
            <div class="button-container"></div>
        </div>
        <div class="glass">
            <p>存档位3</p>
            <p class="mapId">未存档</p>
            <div class="button-container"></div>
        </div>
    </div>

    <div id="blackout" class="fade"></div>

    <script src="../game/Progress.js"></script>
    <script src="../game/PlayerState.js"></script>
    <script src="archive.js"></script>
</body>

</html>
